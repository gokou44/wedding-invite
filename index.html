<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save the Date</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
 <canvas id="petals"></canvas>

  <div class="container">
    <h1 class="title">💍 SAVE THE DATE 💍</h1>

    <div class="names">
      Ngọc Linh ❤️ Huy Tùng
    </div>

    <div class="location">
      📍 King12 - Trống Đồng Cảnh Hồ
    </div>

    <div id="countdown" class="countdown"></div>

    <!-- MAP -->
    <div class="map">
      <div id="couple" class="couple"></div>
      <div class="church">⛪</div>
    </div>

    <!-- MUSIC -->
    <div class="music-box">
      <button id="musicBtn">▶ Phát nhạc</button>
      <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
      </audio>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
